name: Build and Push Docker Image to Docker Hub

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  DOCKER_IMAGE_NAME: danmu-apis

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 设置构建环境信息
      - name: Setup environment
        id: setup-env
        run: |
          echo "Current directory: $(pwd)"
          echo "Files in repository:"
          ls -la
          echo "GITHUB_SHA: $GITHUB_SHA"
          echo "GITHUB_REF: $GITHUB_REF"

      # 3. 从 worker.js 中读取版本号（带完整错误处理）
      - name: Extract version from worker.js
        id: version
        run: |
          set -e  # 遇到错误立即退出
          
          echo "🔍 Searching for version in worker.js..."
          
          # 检查文件是否存在
          if [ ! -f "danmu_apis/worker.js" ]; then
            echo "❌ File danmu_apis/worker.js not found!"
            echo "📁 Current directory content:"
            find . -name "*.js" -type f | head -10
            echo "VERSION=latest" >> $GITHUB_ENV
            echo "VERSION_EXTRACTED=latest" >> $GITHUB_ENV
            exit 0
          fi

          # 显示文件前几行用于调试
          echo "📄 First 10 lines of worker.js:"
          head -10 danmu_apis/worker.js

          # 多种方式尝试提取版本号
          VERSION=$(grep -E 'const VERSION\s*=\s*"[^"]+"' danmu_apis/worker.js | head -1 | sed -E 's/.*const VERSION\s*=\s*"([^"]+)".*/\1/' || true)
          
          # 如果第一种方式失败，尝试其他格式
          if [ -z "$VERSION" ]; then
            VERSION=$(grep -E "const VERSION\s*=\s*'[^']+'" danmu_apis/worker.js | head -1 | sed -E "s/.*const VERSION\s*=\s*'([^']+)'.*/\1/" || true)
          fi
          
          if [ -z "$VERSION" ]; then
            VERSION=$(grep -E 'VERSION\s*=\s*"[^"]+"' danmu_apis/worker.js | head -1 | sed -E 's/.*VERSION\s*=\s*"([^"]+)".*/\1/' || true)
          fi

          # 验证版本号格式
          if [ -n "$VERSION" ]; then
            if [[ "$VERSION" =~ ^[a-zA-Z0-9._-]+$ ]]; then
              echo "✅ Successfully extracted version: $VERSION"
              echo "VERSION=$VERSION" >> $GITHUB_ENV
              echo "VERSION_EXTRACTED=$VERSION" >> $GITHUB_ENV
            else
              echo "⚠️  Extracted version contains invalid characters: $VERSION"
              echo "VERSION=latest" >> $GITHUB_ENV
              echo "VERSION_EXTRACTED=invalid" >> $GITHUB_ENV
            fi
          else
            echo "⚠️  Could not extract version from worker.js, using 'latest'"
            echo "VERSION=latest" >> $GITHUB_ENV
            echo "VERSION_EXTRACTED=latest" >> $GITHUB_ENV
          fi

      # 4. 设置 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      # 5. 登录 Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. 提取元数据（用于标签）
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=git-

      # 7. 验证构建参数
      - name: Validate build parameters
        run: |
          echo "=== Build Parameters ==="
          echo "Docker Username: ${{ secrets.DOCKER_USERNAME }}"
          echo "Image Name: ${{ env.DOCKER_IMAGE_NAME }}"
          echo "Extracted Version: ${{ env.VERSION }}"
          echo "Git SHA: ${{ github.sha }}"
          echo "Git Ref: ${{ github.ref }}"
          
          # 验证必要的 secrets 是否存在
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "❌ DOCKER_USERNAME secret is missing!"
            exit 1
          fi
          
          if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "❌ DOCKER_PASSWORD secret is missing!"
            exit 1
          fi

      # 8. 构建和推送 Docker 镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:git-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 9. 验证推送的镜像
      - name: Verify pushed images
        run: |
          echo "✅ Successfully built and pushed the following images:"
          echo "  - ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.VERSION }}"
          echo "  - ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest"
          echo "  - ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:git-${{ github.sha }}"

  # 可选的：测试工作流
  test:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test Docker image
        run: |
          echo "🧪 Image build completed successfully"
          echo "Image: ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.VERSION }}"

  # 可选的：安全扫描
  security-scan:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.VERSION }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
